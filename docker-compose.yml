version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_chat_postgres
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: ai_chat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_chat_backend
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://ai_user:ai_password@postgres:5432/ai_chat_db?sslmode=disable
      - PORT=8080
      - AI_ENCRYPTION_KEY=${AI_ENCRYPTION_KEY}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_chat_frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    restart: unless-stopped

volumes:
  postgres_data:
